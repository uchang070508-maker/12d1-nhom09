<body>

<main class="container">

  <section class="card">
    <h2>🗺️ Bản đồ & hành trình</h2>
<div class="controls">
  <select id="riverFilter" onchange="filterByRiver()">
    <option value="all">🌊 Tất cả các sông</option>
    <option value="Sông Tiền">Sông Tiền</option>
    <option value="Sông Hậu">Sông Hậu</option>
    <option value="Sông Cổ Chiên">Sông Cổ Chiên</option>
    <option value="Sông Hàm Luông">Sông Hàm Luông</option>
    <option value="Sông Vàm Cỏ">Sông Vàm Cỏ</option>
    <option value="Sông Cửa Lớn">Sông Cửa Lớn</option>
  </select>
</div>
<div class="controls">
  <button onclick="toggleJourney()">🚗 Hành trình qua các cầu</button>
</div>
<div class="controls">
  <select id="bridgeA">
    <option value="">🚩 Chọn cầu A</option>
  </select>

  <select id="bridgeB">
    <option value="">🏁 Chọn cầu B</option>
  </select>

  <button onclick="drawRoute()">📏 Tính & vẽ tuyến</button>
</div>

<p id="distanceResult"></p>

<div id="map"></div>

<script>
/* ===== TẠO MAP ===== */
const map = L.map("map").setView([10.2,105.9],7);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  attribution:"© OpenStreetMap"
}).addTo(map);

/* ===== DỮ LIỆU CẦU ===== */
const bridges = [
  {
    name: "Cầu Mỹ Thuận",
    river: "Sông Tiền",
    lat: 10.2591,
    lng: 105.8051
  },
  {
    name: "Cầu Rạch Miễu",
    river: "Sông Tiền",
    lat: 10.1823,
    lng: 106.2447
  },
  {
    name: "Cầu Cổ Chiên",
    river: "Sông Cổ Chiên",
    lat: 10.1957,
    lng: 106.0072
  },
  {
    name: "Cầu Hàm Luông",
    river: "Sông Hàm Luông",
    lat: 10.1316,
    lng: 106.3384
  },
  {
    name: "Cầu Cao Lãnh",
    river: "Sông Tiền",
    lat: 10.4603,
    lng: 105.6311
  },
  {
    name: "Cầu Vàm Cống",
    river: "Sông Hậu",
    lat: 10.3007,
    lng: 105.5034
  },
  {
    name: "Cầu Cần Thơ",
    river: "Sông Hậu",
    lat: 10.0452,
    lng: 105.7805
  },
  {
    name: "Cầu Mỹ Lợi",
    river: "Sông Vàm Cỏ",
    lat: 10.5664,
    lng: 106.6946
  },
  {
    name: "Cầu Năm Căn",
    river: "Sông Cửa Lớn",
    lat: 8.8216,
    lng: 105.1453
  }
];


let markers = [];

/* ===== HIỂN THỊ CẦU ===== */
function showBridges(list){
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  list.forEach(b=>{
    const m = L.marker([b.lat,b.lng])
      .addTo(map)
      .bindPopup(`<b>${b.name}</b><br>🌊 ${b.river}`);
    markers.push(m);
  });
}

/* ===== LỌC THEO SÔNG ===== */
function filterByRiver(){
  const river = document.getElementById("riverFilter").value;
  if(river==="all"){
    showBridges(bridges);
  } else {
    showBridges(bridges.filter(b=>b.river===river));
  }
}
/* ===== HÀNH TRÌNH QUA CÁC CẦU ===== */
let journeyLine = null;
let journeyVisible = false;

function toggleJourney() {
  if (journeyVisible) {
    map.removeLayer(journeyLine);
    journeyVisible = false;
    return;
  }

  const path = bridges.map(b => [b.lat, b.lng]);

  journeyLine = L.polyline(path, {
    color: "#89f7fe",
    weight: 5,
    opacity: 0.8,
    dashArray: "10 6"
  }).addTo(map);

  journeyVisible = true;
}
/* ===== CHỌN 2 CẦU & VẼ TUYẾN ===== */
let routeLine = null;

/* Đổ dữ liệu cầu vào select */
function loadBridgeOptions() {
  const selectA = document.getElementById("bridgeA");
  const selectB = document.getElementById("bridgeB");

  bridges.forEach((b, index) => {
    const optA = document.createElement("option");
    optA.value = index;
    optA.textContent = b.name;
    selectA.appendChild(optA);

    const optB = document.createElement("option");
    optB.value = index;
    optB.textContent = b.name;
    selectB.appendChild(optB);
  });
}

/* Công thức tính khoảng cách Haversine */
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371; // km
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;
  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(2);
}

/* Vẽ tuyến */
function drawRoute() {
  const aIndex = document.getElementById("bridgeA").value;
  const bIndex = document.getElementById("bridgeB").value;

  if (aIndex === "" || bIndex === "" || aIndex === bIndex) {
    alert("Vui lòng chọn 2 cầu khác nhau");
    return;
  }

  const A = bridges[aIndex];
  const B = bridges[bIndex];

  if (routeLine) map.removeLayer(routeLine);

  routeLine = L.polyline(
    [[A.lat, A.lng],[B.lat, B.lng]],
    {
      color: "#ff9a9e",
      weight: 5,
      dashArray: "8 6"
    }
  ).addTo(map);

  map.fitBounds(routeLine.getBounds());

  const distance = getDistance(A.lat,A.lng,B.lat,B.lng);
  document.getElementById("distanceResult").innerHTML =
    `📏 Khoảng cách đường chim bay: <span style="color:#ff5e7e">${distance} km</span>`;
}

/* LOAD KHI MỞ TRANG */
loadBridgeOptions();

/* LOAD BAN ĐẦU */
showBridges(bridges);
</script>
    <script>
function toggleTheme() {
  document.body.classList.toggle("dark");
  localStorage.setItem(
    "theme",
    document.body.classList.contains("dark") ? "dark" : "light"
  );
}

/* Load lại trạng thái */
if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark");
}
</script>
  <script>
const bgMusic = document.getElementById("bgMusic");
const musicBtn = document.querySelector(".music-toggle");

// LẤY TRẠNG THÁI CŨ
let musicOn = localStorage.getItem("music") !== "off";

// KHỞI ĐỘNG
window.addEventListener("load", () => {
  if (musicOn) {
    bgMusic.volume = 0.4;
    bgMusic.play().catch(()=>{});
  } else {
    musicBtn.classList.add("off");
    musicBtn.textContent = "🔇 ";
  }
});

// BẬT / TẮT
function toggleMusic() {
  musicOn = !musicOn;
  if (musicOn) {
    bgMusic.play();
    musicBtn.textContent = "🎵";
    musicBtn.classList.remove("off");
    localStorage.setItem("music", "on");
  } else {
    bgMusic.pause();
    musicBtn.textContent = "🔇";
    musicBtn.classList.add("off");
    localStorage.setItem("music", "off");
  }
}
</script>

<button id="topBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
</body>
